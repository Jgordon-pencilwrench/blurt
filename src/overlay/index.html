<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="overlay.css">
  <script src="marked.umd.js"></script>
</head>
<body>
  <div id="app">
    <div class="drag-handle">
      <span class="drag-dots">⠿</span>
      <span class="app-label">Blurt</span>
      <span class="drag-dots">⠿</span>
    </div>

    <div id="recording-state" class="state active">
      <div class="recording-header">
        <span class="rec-dot"></span>
        <span id="rec-label" class="rec-label">Listening…</span>
      </div>
      <canvas id="waveform"></canvas>
      <div class="controls">
        <button id="stop-btn" class="primary-btn">Stop <kbd>⌥Space</kbd></button>
        <button id="pause-btn" class="ghost-btn">Pause</button>
        <button id="cancel-btn" class="ghost-btn">Cancel <kbd>esc</kbd></button>
      </div>
    </div>

    <div id="processing-state" class="state">
      <div id="status-text" class="status-text">Transcribing…</div>
    </div>

    <div id="streaming-state" class="state">
      <div id="output-text"></div>
      <div class="controls">
        <span id="done-status" class="done-status"></span>
        <button id="close-btn" class="ghost-btn">Close <kbd>esc</kbd></button>
      </div>
    </div>

    <div id="error-state" class="state">
      <div class="error-icon">✕</div>
      <div id="error-text" class="error-text">An error occurred</div>
      <div class="error-hint">Check ~/Library/Logs/Blurt/main.log for details</div>
      <div class="controls">
        <button id="error-close-btn" class="ghost-btn">Close <kbd>esc</kbd></button>
      </div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
