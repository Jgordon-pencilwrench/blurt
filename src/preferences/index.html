<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blurt Preferences</title>
  <link rel="stylesheet" href="prefs.css">
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Modes</span>
        <button id="add-btn" title="New mode">+</button>
      </div>
      <div id="modes-list"></div>
      <div class="sidebar-footer">
        <div id="general-btn" class="general-nav">⚙ General</div>
      </div>
    </aside>

    <main id="editor-panel">
      <div id="empty-state">
        <div class="empty-icon">◈</div>
        <p>Select a mode to edit</p>
      </div>
      <div id="editor" class="hidden">
        <div class="editor-header">
          <h2 id="editor-title">Edit Mode</h2>
          <button id="delete-btn" class="danger-btn" title="Delete mode">Delete</button>
        </div>
        <div class="field">
          <label for="mode-name">Name</label>
          <input id="mode-name" type="text" placeholder="e.g. Meeting Notes" autocomplete="off">
        </div>
        <div class="field field-grow">
          <label for="mode-prompt">Prompt</label>
          <textarea id="mode-prompt" placeholder="Instructions sent to the AI before your transcription…"></textarea>
        </div>
        <div class="editor-actions">
          <button id="cancel-btn" class="ghost-btn">Discard</button>
          <button id="save-btn" class="save-btn">Save</button>
        </div>
      </div>
      <div id="settings-panel" class="hidden">
        <div class="settings-header">
          <h2>General</h2>
        </div>
        <div class="field">
          <label>Global Shortcut</label>
          <div id="hotkey-capture" class="hotkey-capture" tabindex="0" title="Click to change shortcut">
            <span id="hotkey-display"></span>
            <span id="hotkey-hint" class="hotkey-hint">click to change</span>
          </div>
          <div id="hotkey-error" class="field-error"></div>
        </div>
        <div class="editor-actions">
          <button id="settings-cancel-btn" class="ghost-btn">Discard</button>
          <button id="settings-save-btn" class="save-btn">Save</button>
        </div>
      </div>
    </main>
  </div>

  <script src="prefs.js"></script>
</body>
</html>
