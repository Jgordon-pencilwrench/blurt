appId: com.blurt.app
productName: Blurt
directories:
  output: dist-app
files:
  - dist/**/*
  - bin/**/*
  - src/overlay/**/*
  - src/preferences/**/*
  - src/setup/**/*
  - assets/**/*
extraResources:
  - from: bin/
    to: bin/
    filter:
      - "whisper-cli"
      - "ggml-base.en.bin"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: arm64
dmg:
  title: Blurt
